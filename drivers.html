<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilotos F1 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-drivers">
    <div class="container">
        <header class="page-header card">
            <div>
                <span class="season-label">Pilotos 2026</span>
                <h1>Tabla de Pilotos</h1>
                <p>Consulta los puntajes y abre las mini páginas de cada piloto.</p>
            </div>
            <div class="header-actions">
                <form class="search-form" id="top-search-form">
                    <label class="visually-hidden" for="search-input">Buscar piloto o equipo</label>
                    <input id="search-input" class="search-input search-input-small" type="search" placeholder="Buscar..." autocomplete="off">
                </form>
                <nav class="hero-links">
                    <a class="hero-link" href="index.html">Inicio</a>
                    <a class="hero-link" href="teams.html">Equipos</a>
                </nav>
            </div>
        </header>

        <section class="card standings-card">
            <h2>Puntos por piloto</h2>
            <table class="standings" id="driver-standings">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Piloto</th>
                        <th>Equipo</th>
                        <th>Puntos</th>
                        <th>Detalle</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="entity-grid" id="driver-cards"></section>

        <section class="card search-card">
            <h2>Resultados de búsqueda</h2>
            <ul id="search-results" class="results" aria-live="polite"></ul>
        </section>
    </div>
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
